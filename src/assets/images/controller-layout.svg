<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <rect width="500" height="300" fill="#f0f4f8" rx="8"/>
  <!-- controller body -->
  <ellipse cx="250" cy="150" rx="140" ry="80" fill="#d1d5db"/>
  <!-- left stick -->
  <circle cx="190" cy="160" r="20" fill="#9ca3af"/>
  <circle cx="190" cy="160" r="8" fill="#6b7280"/>
  <!-- right stick -->
  <circle cx="310" cy="160" r="20" fill="#9ca3af"/>
  <circle cx="310" cy="160" r="8" fill="#6b7280"/>
  <!-- dpad -->
  <rect x="155" y="110" width="10" height="30" fill="#6b7280" rx="2"/>
  <rect x="145" y="120" width="30" height="10" fill="#6b7280" rx="2"/>
  <!-- buttons -->
  <circle cx="330" cy="120" r="7" fill="#ef4444"/>
  <circle cx="345" cy="135" r="7" fill="#3b82f6"/>
  <circle cx="315" cy="135" r="7" fill="#ec4899"/>
  <circle cx="330" cy="105" r="7" fill="#22c55e"/>
  <!-- triggers -->
  <rect x="140" y="75" width="40" height="12" fill="#9ca3af" rx="4"/>
  <rect x="320" y="75" width="40" height="12" fill="#9ca3af" rx="4"/>
  <text x="250" y="265" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280">PS5 DualSense Controller Layout (placeholder)</text>
</svg>
