<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" fill="#f0f4f8" rx="8"/>
  <rect x="175" y="60" width="150" height="220" fill="#d1d5db" rx="10"/>
  <!-- axes -->
  <line x1="250" y1="170" x2="350" y2="170" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowR)"/>
  <line x1="250" y1="170" x2="250" y2="80" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="250" y1="170" x2="200" y2="220" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowB)"/>
  <text x="355" y="175" font-family="sans-serif" font-size="14" fill="#ef4444" font-weight="bold">X</text>
  <text x="245" y="72" font-family="sans-serif" font-size="14" fill="#22c55e" font-weight="bold">Z</text>
  <text x="188" y="232" font-family="sans-serif" font-size="14" fill="#3b82f6" font-weight="bold">Y</text>
  <!-- sensors -->
  <circle cx="250" cy="100" r="6" fill="#f59e0b"/>
  <text x="270" y="105" font-family="sans-serif" font-size="10" fill="#6b7280">3D LiDAR</text>
  <circle cx="300" cy="130" r="5" fill="#8b5cf6"/>
  <text x="310" y="135" font-family="sans-serif" font-size="10" fill="#6b7280">Camera</text>
  <circle cx="290" cy="200" r="5" fill="#06b6d4"/>
  <text x="300" y="205" font-family="sans-serif" font-size="10" fill="#6b7280">2D LiDAR</text>
  <text x="250" y="370" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280">Sensor Coordinate Reference (placeholder)</text>
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ef4444"/></marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22c55e"/></marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker>
  </defs>
</svg>
